sonar.projectKey=opsgrid-backend
sonar.projectName=OpsGrid Backend API
sonar.projectVersion=3.2.0

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.js,**/migrations/**

sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results/unit.xml

sonar.qualitygate.wait=true

sonar.coverage.exclusions=\
  **/tests/**,\
  **/migrations/**,\
  **/conftest.py

# Security Hotspot categories to track
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S105
sonar.issue.ignore.multicriteria.e1.resourceKey=**/test_*.py
