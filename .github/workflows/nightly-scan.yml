name: Nightly Security Scan

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily (06:30 IST)
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  trivy-all-images:
    name: Trivy — Scan All ECR Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - payment-svc
          - auth-service
          - order-service
          - notification-svc
          - image-svc
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
          format: 'json'
          output: trivy-${{ matrix.service }}.json
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'

      - name: Upload scan results
        uses: actions/upload-artifact@v3
        with:
          name: trivy-nightly-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.json

  sonar-nightly:
    name: SonarQube — Full Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  owasp-zap-nightly:
    name: OWASP ZAP — Nightly Full Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'https://api.opsgrid.io'
          cmd_options: '-a -j'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v3
        with:
          name: zap-nightly-report
          path: report_html.html
